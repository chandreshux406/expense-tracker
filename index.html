<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Expense Tracker</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
  <style>
    :root {
      --purple: #534AB7;
      --purple-dark: #3C3489;
      --purple-light: #EEEDFE;
      --green: #3B6D11;
      --green-light: #EAF3DE;
      --red: #A32D2D;
      --red-light: #FCEBEB;
      --blue: #185FA5;
      --blue-light: #E6F1FB;
      --amber: #BA7517;
      --amber-light: #FAEEDA;
      --bg: #f5f4f0;
      --surface: #ffffff;
      --surface2: #f8f7f4;
      --border: rgba(0, 0, 0, 0.1);
      --text: #1a1a1a;
      --muted: #6b6b6b;
      --radius: 10px;
      --radius-lg: 14px;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #1a1918;
        --surface: #242320;
        --surface2: #2c2b28;
        --border: rgba(255, 255, 255, 0.1);
        --text: #f0ede8;
        --muted: #9e9b96;
        --purple-light: #2a2660;
        --green-light: #1a2e0a;
        --red-light: #2e1010;
        --blue-light: #0a1e35;
        --amber-light: #2e1e05;
      }
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* ── PIN LOCK ── */
    #pin-screen {
      position: fixed;
      inset: 0;
      background: var(--bg);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
    }

    .pin-card {
      background: var(--surface);
      border-radius: var(--radius-lg);
      border: 1px solid var(--border);
      padding: 40px 36px;
      text-align: center;
      width: 320px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.12);
    }

    .pin-logo {
      font-size: 32px;
      margin-bottom: 8px;
    }

    .pin-title {
      font-size: 20px;
      font-weight: 600;
      margin-bottom: 4px;
    }

    .pin-sub {
      font-size: 13px;
      color: var(--muted);
      margin-bottom: 28px;
    }

    .pin-btn {
      padding: 14px;
      font-size: 18px;
      font-weight: 500;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      cursor: pointer;
      color: var(--text);
      transition: .15s;
    }

    .pin-btn:hover {
      background: var(--purple-light);
      border-color: var(--purple);
    }

    .pin-btn:active {
      transform: scale(0.95);
    }

    .pin-err {
      color: var(--red);
      font-size: 13px;
      margin-top: 12px;
      min-height: 18px;
    }

    /* ── APP SHELL ── */
    #app {
      display: none;
      max-width: 900px;
      margin: 0 auto;
      padding: 16px;
    }

    /* ── HEADER ── */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 20px;
      padding: 0 4px;
    }

    .header-title {
      font-size: 20px;
      font-weight: 700;
    }

    .header-sub {
      font-size: 12px;
      color: var(--muted);
      margin-top: 2px;
    }

    .lock-btn {
      padding: 6px 14px;
      font-size: 12px;
      border: 1px solid var(--border);
      border-radius: 20px;
      background: var(--surface2);
      cursor: pointer;
      color: var(--muted);
    }

    .lock-btn:hover {
      color: var(--text);
    }

    /* ── NAV ── */
    .nav {
      display: flex;
      background: var(--surface);
      border-radius: var(--radius-lg);
      border: 1px solid var(--border);
      padding: 5px;
      gap: 4px;
      margin-bottom: 20px;
    }

    .nav-btn {
      flex: 1;
      padding: 9px 4px;
      font-size: 13px;
      font-weight: 500;
      border: none;
      border-radius: 8px;
      background: none;
      cursor: pointer;
      color: var(--muted);
      transition: .15s;
    }

    .nav-btn.active {
      background: var(--purple);
      color: #fff;
    }

    .nav-btn:hover:not(.active) {
      background: var(--surface2);
      color: var(--text);
    }

    /* ── VIEWS ── */
    .view {
      display: none;
    }

    .view.active {
      display: block;
    }

    /* ── METRIC CARDS ── */
    .metric-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 12px;
      margin-bottom: 20px;
    }

    .metric {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 16px;
    }

    .metric-label {
      font-size: 11px;
      font-weight: 500;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: .04em;
      margin-bottom: 8px;
    }

    .metric-value {
      font-size: 22px;
      font-weight: 700;
    }

    .metric-value.green {
      color: var(--green);
    }

    .metric-value.red {
      color: var(--red);
    }

    .metric-value.blue {
      color: var(--blue);
    }

    .metric-value.purple {
      color: var(--purple);
    }

    .metric-badge {
      font-size: 11px;
      margin-top: 4px;
      padding: 2px 8px;
      border-radius: 20px;
      display: inline-block;
    }

    .badge-green {
      background: var(--green-light);
      color: var(--green);
    }

    .badge-red {
      background: var(--red-light);
      color: var(--red);
    }

    /* ── CARDS ── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 18px;
      margin-bottom: 16px;
    }

    .card-title {
      font-size: 13px;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: .04em;
      margin-bottom: 14px;
    }

    .two-col {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }

    @media(max-width:600px) {
      .two-col {
        grid-template-columns: 1fr;
      }
    }

    /* ── FORMS ── */
    .form-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 10px;
      margin-bottom: 12px;
    }

    .form-group {
      display: flex;
      flex-direction: column;
      gap: 5px;
    }

    .form-label {
      font-size: 11px;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: .04em;
    }

    input,
    select {
      padding: 9px 11px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      font-size: 14px;
      background: var(--surface2);
      color: var(--text);
      width: 100%;
    }

    input:focus,
    select:focus {
      outline: none;
      border-color: var(--purple);
      box-shadow: 0 0 0 3px rgba(83, 74, 183, .12);
    }

    .btn {
      padding: 9px 20px;
      border-radius: var(--radius);
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      border: 1px solid var(--border);
      background: var(--surface2);
      color: var(--text);
      transition: .15s;
    }

    .btn:hover {
      background: var(--purple-light);
    }

    .btn.primary {
      background: var(--purple);
      color: #fff;
      border-color: var(--purple);
    }

    .btn.primary:hover {
      background: var(--purple-dark);
    }

    .btn.sm {
      padding: 5px 12px;
      font-size: 12px;
    }

    /* ── CATEGORY BARS ── */
    .cat-bar {
      margin-bottom: 12px;
    }

    .cat-bar-header {
      display: flex;
      justify-content: space-between;
      font-size: 13px;
      margin-bottom: 5px;
    }

    .cat-bar-name {
      font-weight: 500;
    }

    .cat-bar-amt {
      color: var(--muted);
    }

    .bar-track {
      height: 7px;
      background: var(--surface2);
      border-radius: 4px;
      overflow: hidden;
    }

    .bar-fill {
      height: 100%;
      border-radius: 4px;
      transition: width .5s ease;
    }

    /* ── EXPENSE LIST ── */
    .list-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 12px;
      color: var(--muted);
      margin-bottom: 10px;
      padding: 0 2px;
    }

    .list-total {
      font-weight: 600;
      color: var(--text);
      font-size: 14px;
    }

    .exp-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 11px 14px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      margin-bottom: 7px;
    }

    .exp-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .exp-info {
      flex: 1;
      min-width: 0;
    }

    .exp-desc {
      font-size: 14px;
      font-weight: 500;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .exp-meta {
      font-size: 12px;
      color: var(--muted);
      margin-top: 2px;
    }

    .exp-amt {
      font-size: 15px;
      font-weight: 700;
      min-width: 90px;
      text-align: right;
    }

    .del-btn {
      background: none;
      border: none;
      cursor: pointer;
      color: var(--muted);
      font-size: 15px;
      padding: 4px 6px;
      border-radius: 6px;
    }

    .del-btn:hover {
      color: var(--red);
      background: var(--red-light);
    }

    .edit-btn {
      background: none;
      border: none;
      cursor: pointer;
      color: var(--muted);
      font-size: 13px;
      padding: 4px 6px;
      border-radius: 6px;
    }

    .edit-btn:hover {
      color: var(--purple);
      background: var(--purple-light);
    }

    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.45);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 999;
    }

    .modal {
      background: var(--surface);
      border-radius: var(--radius-lg);
      border: 1px solid var(--border);
      padding: 24px;
      width: 90%;
      max-width: 480px;
    }

    .modal-title {
      font-size: 16px;
      font-weight: 600;
      margin-bottom: 16px;
    }

    .modal-actions {
      display: flex;
      gap: 8px;
      justify-content: flex-end;
      margin-top: 16px;
    }

    /* ── SAVINGS / SALARY ITEMS ── */
    .sav-item,
    .sal-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 11px 14px;
      background: var(--surface2);
      border-radius: var(--radius);
      margin-bottom: 7px;
    }

    .sav-label {
      flex: 1;
    }

    .sav-name {
      font-size: 14px;
      font-weight: 500;
    }

    .sav-type {
      font-size: 11px;
      color: var(--muted);
      margin-top: 2px;
    }

    .sav-amt {
      font-size: 15px;
      font-weight: 700;
      color: var(--blue);
      min-width: 90px;
      text-align: right;
    }

    .sal-amt {
      font-size: 15px;
      font-weight: 700;
      color: var(--green);
      min-width: 90px;
      text-align: right;
    }

    /* ── INCOME SUMMARY ── */
    .summary-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 0;
      border-bottom: 1px solid var(--border);
      font-size: 14px;
    }

    .summary-row:last-child {
      border-bottom: none;
      font-weight: 700;
      font-size: 16px;
      padding-top: 14px;
    }

    .summary-row .label {
      color: var(--muted);
    }

    .summary-pct {
      font-size: 11px;
      background: var(--surface2);
      padding: 2px 8px;
      border-radius: 20px;
      margin-left: 6px;
      color: var(--muted);
    }

    /* ── FILTERS ── */
    .filter-row {
      display: flex;
      gap: 8px;
      margin-bottom: 14px;
      flex-wrap: wrap;
    }

    .filter-row select {
      max-width: 160px;
    }

    /* ── MONTH GROUP ── */
    .month-group {
      margin-bottom: 16px;
    }

    .month-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
    }

    .month-name {
      font-size: 13px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .05em;
      color: var(--muted);
    }

    .month-total {
      font-size: 13px;
      font-weight: 700;
    }

    /* ── SPINNER / EMPTY ── */
    .empty {
      text-align: center;
      padding: 40px;
      color: var(--muted);
      font-size: 14px;
    }

    .dash-filter-btn {
      padding: 7px 13px;
      font-size: 12px;
      font-weight: 500;
      border: none;
      background: none;
      cursor: pointer;
      color: var(--muted);
      transition: .15s;
    }

    .dash-filter-btn.active {
      background: var(--purple);
      color: #fff;
    }

    .dash-filter-btn:hover:not(.active) {
      background: var(--surface2);
      color: var(--text);
    }

    .spinner {
      border: 3px solid var(--border);
      border-top-color: var(--purple);
      border-radius: 50%;
      width: 28px;
      height: 28px;
      animation: spin .7s linear infinite;
      margin: 32px auto;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    .toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      background: #1a1a1a;
      color: #fff;
      padding: 10px 20px;
      border-radius: 20px;
      font-size: 13px;
      opacity: 0;
      transition: opacity .3s;
      pointer-events: none;
      z-index: 999;
    }

    .toast.show {
      opacity: 1;
    }

    .chart-wrap {
      position: relative;
      width: 100%;
      height: 210px;
    }

    .status-bar {
      text-align: center;
      padding: 8px;
      font-size: 12px;
      color: var(--muted);
      background: var(--surface2);
      border-radius: var(--radius);
      margin-bottom: 16px;
    }

    .status-bar.error {
      color: var(--red);
      background: var(--red-light);
    }

    .status-bar.success {
      color: var(--green);
      background: var(--green-light);
    }
  </style>
</head>

<body>

  <!-- ═══════════════════════ PIN SCREEN ═══════════════════════ -->
  <div id="pin-screen">
    <div class="pin-card">
      <div class="pin-logo">💰</div>
      <div class="pin-title">Expense Tracker</div>
      <div class="pin-sub">Enter your PIN to continue</div>
      <div style="position:relative;margin-bottom:16px;">
        <input id="pin-input" type="password" placeholder="Enter your password"
          onkeydown="if(event.key==='Enter')checkPin()" autocomplete="current-password"
          style="width:100%;padding:12px 44px 12px 14px;font-size:16px;border:1.5px solid var(--border);border-radius:10px;background:var(--surface2);color:var(--text);letter-spacing:0.1em;" />
        <button onclick="togglePinVisibility()" id="eye-btn"
          style="position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;font-size:18px;color:var(--muted);padding:0;">👁</button>
      </div>
      <button class="pin-btn" onclick="checkPin()"
        style="width:100%;padding:13px;font-size:15px;font-weight:600;background:var(--purple);color:#fff;border:none;border-radius:10px;cursor:pointer;margin-bottom:8px;">
        Unlock
      </button>
      <div class="pin-err" id="pin-err"></div>
    </div>
  </div>

  <!-- ═══════════════════════ MAIN APP ═══════════════════════ -->
  <div id="app">
    <div class="header">
      <div>
        <div class="header-title">💰 Expense Tracker</div>
        <div class="header-sub" id="last-sync">Connecting…</div>
      </div>
      <button class="lock-btn" onclick="lockApp()">🔒 Lock</button>
    </div>

    <div id="status-bar" class="status-bar" style="display:none"></div>

    <nav class="nav">
      <button class="nav-btn active" onclick="switchView('dashboard',this)">Dashboard</button>
      <button class="nav-btn" onclick="switchView('expenses',this)">Expenses</button>
      <button class="nav-btn" onclick="switchView('savings',this)">Savings</button>
      <button class="nav-btn" onclick="switchView('salary',this)">Salary</button>
    </nav>

    <!-- ── DASHBOARD ── -->
    <div id="view-dashboard" class="view active">

      <!-- Filter bar -->
      <div style="display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap;align-items:center;">
        <div
          style="display:flex;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;">
          <button id="df-day" class="dash-filter-btn" onclick="setDashFilter('day')">Today</button>
          <button id="df-week" class="dash-filter-btn" onclick="setDashFilter('week')">This week</button>
          <button id="df-month" class="dash-filter-btn active" onclick="setDashFilter('month')">This month</button>
          <button id="df-year" class="dash-filter-btn" onclick="setDashFilter('year')">This year</button>
          <button id="df-custom" class="dash-filter-btn" onclick="setDashFilter('custom')">Custom</button>
        </div>
        <div id="dash-custom-filters" style="display:none;gap:8px;display:none;flex-wrap:wrap;">
          <select id="dash-flt-month" onchange="renderDashboard()" style="max-width:140px;">
            <option value="">All months</option>
            <option>January</option>
            <option>February</option>
            <option>March</option>
            <option>April</option>
            <option>May</option>
            <option>June</option>
            <option>July</option>
            <option>August</option>
            <option>September</option>
            <option>October</option>
            <option>November</option>
            <option>December</option>
          </select>
          <select id="dash-flt-year" onchange="renderDashboard()" style="max-width:110px;">
            <option value="">All years</option>
            <option>2024</option>
            <option>2025</option>
            <option>2026</option>
            <option>2027</option>
          </select>
        </div>
      </div>

      <div class="metric-grid" id="dash-metrics">
        <div class="spinner"></div>
      </div>
      <div class="two-col">
        <div class="card">
          <div class="card-title">Spending by category</div>
          <div id="cat-breakdown"></div>
        </div>
        <div class="card">
          <div class="card-title">Category chart</div>
          <div class="chart-wrap"><canvas id="dashChart" role="img"
              aria-label="Bar chart of expenses by category"></canvas></div>
        </div>
      </div>
      <div class="card">
        <div class="card-title">Income vs spending — <span id="dash-month-label">this month</span></div>
        <div id="income-summary"></div>
      </div>
    </div>

    <!-- ── EXPENSES ── -->
    <div id="view-expenses" class="view">
      <div class="card">
        <div class="card-title">Add expense</div>
        <div class="form-grid">
          <div class="form-group"><label class="form-label">Description</label>
            <input id="exp-desc" placeholder="e.g. Swiggy, Metro…" />
          </div>
          <div class="form-group"><label class="form-label">Amount (₹)</label>
            <input id="exp-amt" type="number" placeholder="0" min="0" />
          </div>
          <div class="form-group"><label class="form-label">Category</label>
            <select id="exp-cat">
              <option>Food &amp; Dining</option>
              <option>Transport</option>
              <option>Shopping</option>
              <option>Utilities</option>
              <option>Entertainment</option>
              <option>Health</option>
              <option>Rent</option>
              <option>Education</option>
              <option>Other</option>
            </select>
          </div>
          <div class="form-group"><label class="form-label">Date</label>
            <input id="exp-date" type="date" />
          </div>
          <div class="form-group"><label class="form-label">Month</label>
            <select id="exp-month">
              <option>January</option>
              <option>February</option>
              <option>March</option>
              <option>April</option>
              <option>May</option>
              <option>June</option>
              <option>July</option>
              <option>August</option>
              <option>September</option>
              <option>October</option>
              <option>November</option>
              <option>December</option>
            </select>
          </div>
          <div class="form-group"><label class="form-label">Year</label>
            <input id="exp-year" type="number" value="2026" />
          </div>
        </div>
        <button class="btn primary" onclick="addExpense()">+ Add expense</button>
      </div>
      <div class="filter-row">
        <select id="flt-month" onchange="renderExpenses()">
          <option value="">All months</option>
          <option>January</option>
          <option>February</option>
          <option>March</option>
          <option>April</option>
          <option>May</option>
          <option>June</option>
          <option>July</option>
          <option>August</option>
          <option>September</option>
          <option>October</option>
          <option>November</option>
          <option>December</option>
        </select>
        <select id="flt-cat" onchange="renderExpenses()">
          <option value="">All categories</option>
          <option>Food &amp; Dining</option>
          <option>Transport</option>
          <option>Shopping</option>
          <option>Utilities</option>
          <option>Entertainment</option>
          <option>Health</option>
          <option>Rent</option>
          <option>Education</option>

  <script>
    // ══════════════════════════════════════════════════════
    //  CONFIG — paste your Apps Script URL here after deploy
    // ══════════════════════════════════════════════════════
    const API_URL = 'https://script.google.com/macros/s/AKfycbwM2dg7-PlvI_oYYtfYnigUxu-UvBFyajS6VJRAuKNghJ8afYYYvYTVyzoNaqlhuJ_y/exec'; // ← Replace with your Apps Script URL
    // PIN is validated server-side only — never stored here

    // ── Category colours ──────────────────────────────────
    const CAT_COLOR = {
      'Food & Dining': '#D85A30', 'Transport': '#185FA5', 'Shopping': '#D4537E',
      'Utilities': '#639922', 'Entertainment': '#534AB7', 'Health': '#1D9E75',
      'Rent': '#BA7517', 'Education': '#888780', 'Other': '#5F5E5A'
    };
    const MONTHS = ['January', 'February', 'March', 'April', 'May', 'June',
      'July', 'August', 'September', 'October', 'November', 'December'];

    // ── State ─────────────────────────────────────────────
    let DB = { expenses: [], savings: [], salary: [] };
    let dashChart = null;

    // ══════════════════════════════════════════════════════
    //  PIN LOCK
    // ══════════════════════════════════════════════════════
    function pinClear() {
      document.getElementById('pin-input').value = '';
      document.getElementById('pin-err').textContent = '';
    }
    function togglePinVisibility() {
      const input = document.getElementById('pin-input');
      input.type = input.type === 'password' ? 'text' : 'password';
    }
    async function checkPin() {
      const pin = document.getElementById('pin-input').value;
      const errEl = document.getElementById('pin-err');
      if (!pin) { errEl.textContent = 'Please enter your password.'; return; }

      // If no API URL set yet, do client-side check is impossible — just unlock
      if (!API_URL || API_URL === 'YOUR_APPS_SCRIPT_URL') {
        errEl.textContent = 'API URL not set in index.html.';
        return;
      }

      errEl.textContent = 'Checking…';
      errEl.style.color = 'var(--muted)';

      try {
        // Try verifyPin first, fall back to getAll if verifyPin not in this deployment
        try {
          await jsonp({ action: 'verifyPin', pin });
        } catch (e1) {
          // If error is NOT "Invalid PIN", try getAll as fallback verification
          if (e1.message && e1.message.includes('Invalid PIN')) throw e1;
          // verifyPin may not exist in old deployment — try getAll instead
          await jsonp({ action: 'getAll', pin });
        }
        sessionStorage.setItem('et_pin', pin);
        errEl.textContent = '';
        document.getElementById('pin-screen').style.display = 'none';
        document.getElementById('app').style.display = 'block';
        loadAll();
      } catch (e) {
        errEl.style.color = 'var(--red)';
        if (e.message && e.message.includes('timed out')) {
          errEl.textContent = 'Connection timed out — check your API URL.';
        } else if (e.message && (e.message.includes('Invalid PIN') || e.message.includes('invalid'))) {
          errEl.textContent = 'Incorrect password. Try again.';
          pinClear();
          document.getElementById('pin-input').focus();
        } else {
          errEl.textContent = 'Error: ' + e.message + ' — try redeploying Apps Script.';
          pinClear();
        }
      }
    }
    function lockApp() {
      sessionStorage.removeItem('et_pin');
      document.getElementById('pin-screen').style.display = 'flex';
      document.getElementById('app').style.display = 'none';
      pinClear();
      setTimeout(() => document.getElementById('pin-input').focus(), 100);
    }

    // ══════════════════════════════════════════════════════
    //  API
    // ══════════════════════════════════════════════════════
    function jsonp(params) {
      return new Promise((resolve, reject) => {
        const pin = params.pin || sessionStorage.getItem('et_pin') || '';
        const cbName = 'cb_' + Math.random().toString(36).slice(2);
        const timeout = setTimeout(() => {
          delete window[cbName];
          reject(new Error('Request timed out'));
        }, 10000);
        window[cbName] = (data) => {
          clearTimeout(timeout);
          delete window[cbName];
          if (data.ok) resolve(data.data);
          else reject(new Error(data.error));
        };
        const url = API_URL + '?' + new URLSearchParams({ ...params, pin, callback: cbName });
        const s = document.createElement('script');
        s.src = url;
        s.onerror = () => { clearTimeout(timeout); delete window[cbName]; reject(new Error('Failed to reach API - check your URL')); };
        document.head.appendChild(s);
        setTimeout(() => s.remove(), 12000);
      });
    }
    async function apiGet(params) { return jsonp(params); }
    async function apiPost(body) { return jsonp(body); }

    function setStatus(msg, type = '') {
      const el = document.getElementById('status-bar');
      if (!msg) { el.style.display = 'none'; return; }
      el.textContent = msg;
      el.className = 'status-bar' + (type ? ' ' + type : '');
      el.style.display = 'block';
    }

    async function loadAll() {
      setStatus('Loading your data…');
      try {
        const data = await apiGet({ action: 'getAll' });
        DB.expenses = (data.expenses || []).map(e => ({ ...e, Amount: Number(e.Amount || e.amt || 0), Year: Number(e.Year || e.year || 0) }));
        DB.savings = (data.savings || []).map(s => ({ ...s, Amount: Number(s.Amount || s.amt || 0), Year: Number(s.Year || s.year || 0) }));
        DB.salary = (data.salary || []).map(s => ({ ...s, Amount: Number(s.Amount || s.amt || 0), Year: Number(s.Year || s.year || 0) }));
        // Seed sample data if sheets are empty
        if (!DB.expenses.length && !DB.savings.length && !DB.salary.length) {
          await seedSampleData();
          return;
        }
        setStatus('');
        document.getElementById('last-sync').textContent = 'Last sync: ' + new Date().toLocaleTimeString();
        renderDashboard(); renderExpenses(); renderSavings(); renderSalary();
      } catch (e) {
        setStatus('⚠ Cannot connect. Check your API_URL in index.html. Error: ' + e.message, 'error');
        document.getElementById('last-sync').textContent = 'Not connected';
        // Show sample data offline
        loadOfflineSample();
      }
    }

    async function seedSampleData() {
      const y = new Date().getFullYear(); const m = MONTHS[new Date().getMonth()];
      const exp = [
        { desc: 'Swiggy lunch', amt: 320, cat: 'Food & Dining', date: new Date().toISOString().split('T')[0], month: m, year: y },
        { desc: 'Metro card', amt: 500, cat: 'Transport', date: new Date().toISOString().split('T')[0], month: m, year: y },
        { desc: 'Electricity bill', amt: 1800, cat: 'Utilities', date: new Date().toISOString().split('T')[0], month: m, year: y },
        { desc: 'Amazon order', amt: 2400, cat: 'Shopping', date: new Date().toISOString().split('T')[0], month: m, year: y },
        { desc: 'Gym membership', amt: 1500, cat: 'Health', date: '2025-04-01', month: m, year: y },
        { desc: 'Netflix', amt: 649, cat: 'Entertainment', date: new Date().toISOString().split('T')[0], month: m, year: y },
      ];
      const sav = [
        { name: 'Parag Parikh Flexi SIP', type: 'Mutual Fund SIP', amt: 5000, month: m, year: y },
        { name: 'EPF contribution', type: 'PF / EPF', amt: 3600, month: m, year: y },
        { name: 'PPF', type: 'PPF', amt: 2000, month: m, year: y },
      ];
      const sal = [{ source: 'Monthly salary', amt: 85000, month: m, year: y }];
      try {
        for (const e of exp) { const r = await apiPost({ action: 'addExpense', ...e }); DB.expenses.push({ ID: r.id, ...e }); }
        for (const s of sav) { const r = await apiPost({ action: 'addSaving', ...s }); DB.savings.push({ ID: r.id, ...s }); }
        for (const s of sal) { const r = await apiPost({ action: 'addSalary', ...s }); DB.salary.push({ ID: r.id, ...s }); }
        setStatus('Sample data loaded into your Google Sheet!', 'success');
        setTimeout(() => setStatus(''), 3000);
      } catch (e) { setStatus('Seeded locally (offline)', ''); }
      renderDashboard(); renderExpenses(); renderSavings(); renderSalary();
      document.getElementById('last-sync').textContent = 'Last sync: ' + new Date().toLocaleTimeString();
    }

    function loadOfflineSample() {
      DB = {
        expenses: [
          { ID: 'A1', Description: 'Swiggy lunch', Amount: 320, Category: 'Food & Dining', Date: '2025-04-10', Month: 'April', Year: 2025 },
          { ID: 'A2', Description: 'Metro card', Amount: 500, Category: 'Transport', Date: '2025-04-08', Month: 'April', Year: 2025 },
          { ID: 'A3', Description: 'Electricity bill', Amount: 1800, Category: 'Utilities', Date: '2025-04-05', Month: 'April', Year: 2025 },
          { ID: 'A4', Description: 'Amazon order', Amount: 2400, Category: 'Shopping', Date: '2025-04-12', Month: 'April', Year: 2025 },
          { ID: 'A5', Description: 'Gym membership', Amount: 1500, Category: 'Health', Date: '2025-04-01', Month: 'April', Year: 2025 },
        ],
        savings: [
          { ID: 'B1', Name: 'Parag Parikh Flexi SIP', Type: 'Mutual Fund SIP', Amount: 5000, Month: 'April', Year: 2025 },
          { ID: 'B2', Name: 'EPF', Type: 'PF / EPF', Amount: 3600, Month: 'April', Year: 2025 },
        ],
        salary: [{ ID: 'C1', Source: 'Monthly salary', Amount: 85000, Month: 'April', Year: 2025 }]
      };
      renderDashboard(); renderExpenses(); renderSavings(); renderSalary();
    }

    // ── Helpers ──────────────────────────────────────────────────
    function fmt(n) { return '₹' + Math.round(n).toLocaleString('en-IN'); }

    function expAmt(e) { return Number(e.Amount ?? e.amt ?? 0); }
    function expCat(e) { return e.Category ?? e.cat ?? ''; }
    function expDesc(e) { return e.Description ?? e.desc ?? ''; }
    function expMonth(e) { return e.Month ?? e.month ?? ''; }
    function expYear(e) { return Number(e.Year ?? e.year ?? 0); }
    function expDate(e) { return e.Date ?? e.date ?? ''; }
    function expId(e) { return e.ID ?? e.id ?? ''; }

    function savAmt(s) { return Number(s.Amount ?? s.amt ?? 0); }
    function savName(s) { return s.Name ?? s.name ?? ''; }
    function savType(s) { return s.Type ?? s.type ?? ''; }
    function savMonth(s) { return s.Month ?? s.month ?? ''; }
    function savId(s) { return s.ID ?? s.id ?? ''; }

    function salAmt(s) { return Number(s.Amount ?? s.amt ?? 0); }
    function salSrc(s) { return s.Source ?? s.source ?? ''; }
    function salMonth(s) { return s.Month ?? s.month ?? ''; }
    function salId(s) { return s.ID ?? s.id ?? ''; }

    function showToast(msg) {
      const t = document.getElementById('toast');
      t.textContent = msg; t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 2400);
    }

    // ══════════════════════════════════════════════════════
    //  DASHBOARD FILTER STATE
    // ══════════════════════════════════════════════════════
    let dashFilter = 'month'; // day | week | month | year | custom

    function setDashFilter(f) {
      dashFilter = f;
      document.querySelectorAll('.dash-filter-btn').forEach(b => b.classList.remove('active'));
      document.getElementById('df-' + f).classList.add('active');
      const customEl = document.getElementById('dash-custom-filters');
      customEl.style.display = f === 'custom' ? 'flex' : 'none';
      renderDashboard();
    }

    function getFilteredData() {
      const now = new Date();
      const cy = now.getFullYear();
      const cm = MONTHS[now.getMonth()];
      let label = cm + ' ' + cy;
      let mExp, mSav, mSal;

      if (dashFilter === 'day') {
        const today = now.toISOString().split('T')[0];
        mExp = DB.expenses.filter(e => expDate(e) === today);
        mSav = [];
        mSal = [];
        label = 'Today ' + today;

      } else if (dashFilter === 'week') {
        const startOfWeek = new Date(now);
        startOfWeek.setDate(now.getDate() - now.getDay());
        startOfWeek.setHours(0, 0, 0, 0);
        mExp = DB.expenses.filter(e => {
          const d = new Date(expDate(e));
          return d >= startOfWeek && d <= now;
        });
        mSav = [];
        mSal = [];
        label = 'This week';

      } else if (dashFilter === 'month') {
        mExp = DB.expenses.filter(e => expMonth(e) === cm && expYear(e) === cy);
        mSav = DB.savings.filter(s => savMonth(s) === cm && Number(s.Year || s.year || cy) === cy);
        mSal = DB.salary.filter(s => salMonth(s) === cm && Number(s.Year || s.year || cy) === cy);
        label = cm + ' ' + cy;

      } else if (dashFilter === 'year') {
        mExp = DB.expenses.filter(e => expYear(e) === cy);
        mSav = DB.savings.filter(s => Number(s.Year || s.year || cy) === cy);
        mSal = DB.salary.filter(s => Number(s.Year || s.year || cy) === cy);
        label = 'Year ' + cy;

      } else { // custom
        const fm = document.getElementById('dash-flt-month').value;
        const fy = document.getElementById('dash-flt-year').value;
        mExp = DB.expenses.filter(e =>
          (!fm || expMonth(e) === fm) && (!fy || String(expYear(e)) === fy));
        mSav = DB.savings.filter(s =>
          (!fm || savMonth(s) === fm) && (!fy || String(s.Year || s.year || '') === fy));
        mSal = DB.salary.filter(s =>
          (!fm || salMonth(s) === fm) && (!fy || String(s.Year || s.year || '') === fy));
        label = (fm || 'All months') + (fy ? ' ' + fy : '');
      }

      return { mExp, mSav, mSal, label };
    }

    // ══════════════════════════════════════════════════════
    //  DASHBOARD
    // ══════════════════════════════════════════════════════
    function renderDashboard() {
      const { mExp, mSav, mSal, label } = getFilteredData();
      document.getElementById('dash-month-label').textContent = label;

      const totExp = mExp.reduce((s, e) => s + expAmt(e), 0);
      const totSav = mSav.reduce((s, e) => s + savAmt(e), 0);
      const totInc = mSal.reduce((s, e) => s + salAmt(e), 0);
      const net = totInc - totExp - totSav;
      const pctExp = totInc ? Math.round(totExp / totInc * 100) : 0;
      const pctSav = totInc ? Math.round(totSav / totInc * 100) : 0;

      document.getElementById('dash-metrics').innerHTML = `
    <div class="metric"><div class="metric-label">Monthly income</div>
      <div class="metric-value green">${fmt(totInc)}</div>
      <div class="metric-badge badge-green">${cm} ${cy}</div></div>
    <div class="metric"><div class="metric-label">Total expenses</div>
      <div class="metric-value red">${fmt(totExp)}</div>
      <div class="metric-badge badge-red">${pctExp}% of income</div></div>
    <div class="metric"><div class="metric-label">Total savings</div>
      <div class="metric-value blue">${fmt(totSav)}</div>
      <div class="metric-badge" style="background:var(--blue-light);color:var(--blue)">${pctSav}% of income</div></div>
    <div class="metric"><div class="metric-label">Net in hand</div>
      <div class="metric-value ${net >= 0 ? 'green' : 'red'}">${fmt(Math.abs(net))}</div>
      <div class="metric-badge ${net >= 0 ? 'badge-green' : 'badge-red'}">${net < 0 ? 'deficit' : 'available'}</div></div>
  `;

      const catMap = {};
      mExp.forEach(e => { const c = expCat(e); catMap[c] = (catMap[c] || 0) + expAmt(e); });
      const sorted = Object.entries(catMap).sort((a, b) => b[1] - a[1]);
      const maxAmt = sorted.length ? sorted[0][1] : 1;

      document.getElementById('cat-breakdown').innerHTML = sorted.length
        ? sorted.map(([cat, amt]) => `
        <div class="cat-bar">
          <div class="cat-bar-header">
            <span class="cat-bar-name">${cat}</span>
            <span class="cat-bar-amt">${fmt(amt)}</span>
          </div>
          <div class="bar-track">
            <div class="bar-fill" style="width:${Math.round(amt / maxAmt * 100)}%;background:${CAT_COLOR[cat] || '#888'}"></div>
          </div>
        </div>`).join('')
        : '<div class="empty">No expenses this month</div>';

      if (dashChart) { dashChart.destroy(); dashChart = null; }
      if (sorted.length) {
        dashChart = new Chart(document.getElementById('dashChart'), {
          type: 'bar',
          data: {
            labels: sorted.map(([c]) => c),
            datasets: [{
              data: sorted.map(([, a]) => a),
              backgroundColor: sorted.map(([c]) => CAT_COLOR[c] || '#888'),
              borderRadius: 5
            }]
          },
          options: {
            responsive: true, maintainAspectRatio: false,
            plugins: { legend: { display: false } },
            scales: {
              x: { ticks: { font: { size: 9 }, maxRotation: 45 } },
              y: { ticks: { callback: v => '₹' + v.toLocaleString('en-IN'), font: { size: 9 } } }
            }
          }
        });
      }

      document.getElementById('income-summary').innerHTML = `
    <div class="summary-row">
      <span class="label">Gross income</span>
      <span style="color:var(--green);font-weight:600">${fmt(totInc)}</span></div>
    <div class="summary-row">
      <span class="label">Expenses <span class="summary-pct">${pctExp}%</span></span>
      <span style="color:var(--red);font-weight:600">− ${fmt(totExp)}</span></div>
    <div class="summary-row">
      <span class="label">Savings <span class="summary-pct">${pctSav}%</span></span>
      <span style="color:var(--blue);font-weight:600">− ${fmt(totSav)}</span></div>
    <div class="summary-row">
      <span>Net in hand</span>
      <span style="color:${net >= 0 ? 'var(--green)' : 'var(--red)'}">${fmt(Math.abs(net))} ${net < 0 ? '(deficit)' : ''}</span></div>
  `;
    }

    // ══════════════════════════════════════════════════════
    //  EXPENSES
    // ══════════════════════════════════════════════════════
    async function addExpense() {
      const desc = document.getElementById('exp-desc').value.trim();
      const amt = parseFloat(document.getElementById('exp-amt').value);
      const cat = document.getElementById('exp-cat').value;
      const date = document.getElementById('exp-date').value;
      const month = document.getElementById('exp-month').value;
      const year = parseInt(document.getElementById('exp-year').value) || new Date().getFullYear();
      if (!desc || !amt || amt <= 0) { showToast('Fill in description and amount'); return; }
      try {
        const r = await apiPost({ action: 'addExpense', desc, amt, cat, date, month, year });
        DB.expenses.push({ ID: r.id, Description: desc, Amount: amt, Category: cat, Date: date, Month: month, Year: Number(year) });
        document.getElementById('exp-desc').value = '';
        document.getElementById('exp-amt').value = '';
        renderExpenses(); renderDashboard();
        showToast('Expense saved to Google Sheet ✓');
      } catch (e) { showToast('Error: ' + e.message); }
    }

    async function deleteExpense(id) {
      if (!confirm('Delete this expense?')) return;
      try {
        await apiGet({ action: 'deleteExpense', id });
        DB.expenses = DB.expenses.filter(e => expId(e) !== id);
        renderExpenses(); renderDashboard();
        showToast('Deleted ✓');
      } catch (e) { showToast('Error: ' + e.message); }
    }

    function renderExpenses() {
      const fm = document.getElementById('flt-month').value;
      const fc = document.getElementById('flt-cat').value;
      const fy = document.getElementById('flt-year').value;
      let list = [...DB.expenses];
      if (fm) list = list.filter(e => expMonth(e) === fm);
      if (fc) list = list.filter(e => expCat(e) === fc);
      if (fy) list = list.filter(e => String(expYear(e)) === fy);
      list.sort((a, b) => String(expId(b)).localeCompare(String(expId(a))));
      const total = list.reduce((s, e) => s + expAmt(e), 0);
      const el = document.getElementById('expense-list');
      if (!list.length) { el.innerHTML = '<div class="empty">No expenses found</div>'; return; }
      el.innerHTML = `<div class="list-header"><span>${list.length} expense${list.length !== 1 ? 's' : ''}</span>
    <span class="list-total">${fmt(total)}</span></div>`
        + list.map(e => `
      <div class="exp-item">
        <div class="exp-dot" style="background:${CAT_COLOR[expCat(e)] || '#888'}"></div>
        <div class="exp-info">
          <div class="exp-desc">${expDesc(e)}</div>
          <div class="exp-meta">${expCat(e)} · ${expMonth(e)} ${expYear(e)}${expDate(e) ? ' · ' + expDate(e) : ''}</div>
        </div>
        <div class="exp-amt">${fmt(expAmt(e))}</div>
        <button class="edit-btn" onclick="openEditExpense('${expId(e)}')">✏️</button>
        <button class="del-btn" onclick="deleteExpense('${expId(e)}')">✕</button>
      </div>`).join('');
    }

    // ══════════════════════════════════════════════════════
    //  SAVINGS
    // ══════════════════════════════════════════════════════
    async function addSaving() {
      const name = document.getElementById('sav-name').value.trim();
      const type = document.getElementById('sav-type').value;
      const amt = parseFloat(document.getElementById('sav-amt').value);
      const month = document.getElementById('sav-month').value;
      const year = parseInt(document.getElementById('sav-year').value) || new Date().getFullYear();
      if (!name || !amt || amt <= 0) { showToast('Fill in name and amount'); return; }
      try {
        const r = await apiPost({ action: 'addSaving', name, type, amt, month, year });
        DB.savings.push({ ID: r.id, Name: name, Type: type, Amount: amt, Month: month, Year: Number(year) });
        document.getElementById('sav-name').value = '';
        document.getElementById('sav-amt').value = '';
        renderSavings(); renderDashboard();
        showToast('Saving added ✓');
      } catch (e) { showToast('Error: ' + e.message); }
    }

    async function deleteSaving(id) {
      if (!confirm('Delete this saving?')) return;
      try {
        await apiGet({ action: 'deleteSaving', id });
        DB.savings = DB.savings.filter(s => savId(s) !== id);
        renderSavings(); renderDashboard();
        showToast('Deleted ✓');
      } catch (e) { showToast('Error: ' + e.message); }
    }

    function renderSavings() {
      const el = document.getElementById('savings-list');
      if (!DB.savings.length) { el.innerHTML = '<div class="empty">No savings added yet</div>'; return; }
      const grouped = {};
      DB.savings.forEach(s => {
        const k = savMonth(s) + ' ' + (s.Year || s.year || '');
        if (!grouped[k]) grouped[k] = []; grouped[k].push(s);
      });
      el.innerHTML = Object.entries(grouped).map(([period, items]) => {
        const total = items.reduce((s, i) => s + savAmt(i), 0);
        return `<div class="card">
      <div class="month-header">
        <div class="month-name">${period}</div>
        <div class="month-total" style="color:var(--blue)">${fmt(total)}</div>
      </div>
      ${items.map(s => `
        <div class="sav-item">
          <div class="sav-label">
            <div class="sav-name">${savName(s)}</div>
            <div class="sav-type">${savType(s)}</div>
          </div>
          <div class="sav-amt">${fmt(savAmt(s))}</div>
          <button class="edit-btn" onclick="openEditSaving('${savId(s)}')">✏️</button>
          <button class="del-btn" onclick="deleteSaving('${savId(s)}')">✕</button>
        </div>`).join('')}
    </div>`;
      }).join('');
    }

    // ══════════════════════════════════════════════════════
    //  SALARY
    // ══════════════════════════════════════════════════════
    async function addSalary() {
      const source = document.getElementById('sal-source').value.trim();
      const amt = parseFloat(document.getElementById('sal-amt').value);
      const month = document.getElementById('sal-month').value;
      const year = parseInt(document.getElementById('sal-year').value) || new Date().getFullYear();
      if (!source || !amt || amt <= 0) { showToast('Fill in source and amount'); return; }
      try {
        const r = await apiPost({ action: 'addSalary', source, amt, month, year });
        DB.salary.push({ ID: r.id, Source: source, Amount: amt, Month: month, Year: Number(year) });
        document.getElementById('sal-source').value = '';
        document.getElementById('sal-amt').value = '';
        renderSalary(); renderDashboard();
        showToast('Income added ✓');
      } catch (e) { showToast('Error: ' + e.message); }
    }

    async function deleteSalary(id) {
      if (!confirm('Delete this income entry?')) return;
      try {
        await apiGet({ action: 'deleteSalary', id });
        DB.salary = DB.salary.filter(s => salId(s) !== id);
        renderSalary(); renderDashboard();
        showToast('Deleted ✓');
      } catch (e) { showToast('Error: ' + e.message); }
    }

    function renderSalary() {
      const el = document.getElementById('salary-list');
      if (!DB.salary.length) { el.innerHTML = '<div class="empty">No income added yet</div>'; return; }
      const grouped = {};
      DB.salary.forEach(s => {
        const k = salMonth(s) + ' ' + (s.Year || s.year || '');
        if (!grouped[k]) grouped[k] = []; grouped[k].push(s);
      });
      el.innerHTML = Object.entries(grouped).map(([period, items]) => {
        const total = items.reduce((s, i) => s + salAmt(i), 0);
        return `<div class="card">
      <div class="month-header">
        <div class="month-name">${period}</div>
        <div class="month-total" style="color:var(--green)">${fmt(total)}</div>
      </div>
      ${items.map(s => `
        <div class="sal-item">
          <span style="flex:1;font-size:14px;font-weight:500">${salSrc(s)}</span>
          <div class="sal-amt">${fmt(salAmt(s))}</div>
          <button class="edit-btn" onclick="openEditSalary('${salId(s)}')">✏️</button>
          <button class="del-btn" onclick="deleteSalary('${salId(s)}')">✕</button>
        </div>`).join('')}
    </div>`;
      }).join('');
    }

    // ── NAV ──────────────────────────────────────────────────────
    function switchView(v, btn) {
      document.querySelectorAll('.view').forEach(el => el.classList.remove('active'));
      document.querySelectorAll('.nav-btn').forEach(el => el.classList.remove('active'));
      document.getElementById('view-' + v).classList.add('active');
      btn.classList.add('active');
    }

    // ══════════════════════════════════════════════════════
    //  EDIT MODAL
    // ══════════════════════════════════════════════════════
    let editContext = null; // { type, id }

    const CATS = ['Food & Dining', 'Transport', 'Shopping', 'Utilities', 'Entertainment', 'Health', 'Rent', 'Education', 'Other'];
    const SAV_TYPES = ['Mutual Fund SIP', 'PF / EPF', 'PPF', 'Fixed Deposit', 'RD', 'NPS', 'Stocks', 'Gold', 'Emergency Fund', 'Other'];

    function monthOpts(selected) {
      return MONTHS.map(m => `<option ${m === selected ? 'selected' : ''} value="${m}">${m}</option>`).join('');
    }
    function catOpts(selected) {
      return CATS.map(c => `<option ${c === selected ? 'selected' : ''} value="${c}">${c}</option>`).join('');
    }
    function savTypeOpts(selected) {
      return SAV_TYPES.map(t => `<option ${t === selected ? 'selected' : ''} value="${t}">${t}</option>`).join('');
    }

    function openEditExpense(id) {
      const e = DB.expenses.find(x => String(expId(x)) === String(id));
      if (!e) return;
      editContext = { type: 'expense', id };
      document.getElementById('modal-title').textContent = 'Edit expense';
      document.getElementById('modal-body').innerHTML = `
    <div class="form-grid">
      <div class="form-group"><label class="form-label">Description</label>
        <input id="edit-desc" value="${expDesc(e)}" /></div>
      <div class="form-group"><label class="form-label">Amount (₹)</label>
        <input id="edit-amt" type="number" value="${expAmt(e)}" /></div>
      <div class="form-group"><label class="form-label">Category</label>
        <select id="edit-cat">${catOpts(expCat(e))}</select></div>
      <div class="form-group"><label class="form-label">Date</label>
        <input id="edit-date" type="date" value="${expDate(e)}" /></div>
      <div class="form-group"><label class="form-label">Month</label>
        <select id="edit-month">${monthOpts(expMonth(e))}</select></div>
      <div class="form-group"><label class="form-label">Year</label>
        <input id="edit-year" type="number" value="${expYear(e)}" /></div>
    </div>`;
      document.getElementById('edit-modal').style.display = 'flex';
    }

    function openEditSaving(id) {
      const s = DB.savings.find(x => String(savId(x)) === String(id));
      if (!s) return;
      editContext = { type: 'saving', id };
      document.getElementById('modal-title').textContent = 'Edit saving';
      document.getElementById('modal-body').innerHTML = `
    <div class="form-grid">
      <div class="form-group"><label class="form-label">Name</label>
        <input id="edit-name" value="${savName(s)}" /></div>
      <div class="form-group"><label class="form-label">Type</label>
        <select id="edit-savtype">${savTypeOpts(savType(s))}</select></div>
      <div class="form-group"><label class="form-label">Amount (₹)</label>
        <input id="edit-amt" type="number" value="${savAmt(s)}" /></div>
      <div class="form-group"><label class="form-label">Month</label>
        <select id="edit-month">${monthOpts(savMonth(s))}</select></div>
      <div class="form-group"><label class="form-label">Year</label>
        <input id="edit-year" type="number" value="${s.Year || s.year || ''}" /></div>
    </div>`;
      document.getElementById('edit-modal').style.display = 'flex';
    }

    function openEditSalary(id) {
      const s = DB.salary.find(x => String(salId(x)) === String(id));
      if (!s) return;
      editContext = { type: 'salary', id };
      document.getElementById('modal-title').textContent = 'Edit income';
      document.getElementById('modal-body').innerHTML = `
    <div class="form-grid">
      <div class="form-group"><label class="form-label">Source</label>
        <input id="edit-source" value="${salSrc(s)}" /></div>
      <div class="form-group"><label class="form-label">Amount (₹)</label>
        <input id="edit-amt" type="number" value="${salAmt(s)}" /></div>
      <div class="form-group"><label class="form-label">Month</label>
        <select id="edit-month">${monthOpts(salMonth(s))}</select></div>
      <div class="form-group"><label class="form-label">Year</label>
        <input id="edit-year" type="number" value="${s.Year || s.year || ''}" /></div>
    </div>`;
      document.getElementById('edit-modal').style.display = 'flex';
    }

    function closeModal() {
      document.getElementById('edit-modal').style.display = 'none';
      editContext = null;
    }

    async function saveEdit() {
      if (!editContext) return;
      const { type, id } = editContext;
      const amt = parseFloat(document.getElementById('edit-amt').value);
      if (!amt || amt <= 0) { showToast('Enter a valid amount'); return; }

      try {
        if (type === 'expense') {
          const desc = document.getElementById('edit-desc').value.trim();
          const cat = document.getElementById('edit-cat').value;
          const date = document.getElementById('edit-date').value;
          const month = document.getElementById('edit-month').value;
          const year = parseInt(document.getElementById('edit-year').value) || new Date().getFullYear();
          if (!desc) { showToast('Enter a description'); return; }
          // Delete old + add new (Google Sheets has no update API via JSONP)
          await apiGet({ action: 'deleteExpense', id });
          const r = await apiPost({ action: 'addExpense', desc, amt, cat, date, month, year });
          DB.expenses = DB.expenses.filter(e => String(expId(e)) !== String(id));
          DB.expenses.push({ ID: r.id, Description: desc, Amount: amt, Category: cat, Date: date, Month: month, Year: Number(year) });
          renderExpenses(); renderDashboard();

        } else if (type === 'saving') {
          const name = document.getElementById('edit-name').value.trim();
          const stype = document.getElementById('edit-savtype').value;
          const month = document.getElementById('edit-month').value;
          const year = parseInt(document.getElementById('edit-year').value) || new Date().getFullYear();
          if (!name) { showToast('Enter a name'); return; }
          await apiGet({ action: 'deleteSaving', id });
          const r = await apiPost({ action: 'addSaving', name, type: stype, amt, month, year });
          DB.savings = DB.savings.filter(s => String(savId(s)) !== String(id));
          DB.savings.push({ ID: r.id, Name: name, Type: stype, Amount: amt, Month: month, Year: Number(year) });
          renderSavings(); renderDashboard();

        } else if (type === 'salary') {
          const source = document.getElementById('edit-source').value.trim();
          const month = document.getElementById('edit-month').value;
          const year = parseInt(document.getElementById('edit-year').value) || new Date().getFullYear();
          if (!source) { showToast('Enter a source'); return; }
          await apiGet({ action: 'deleteSalary', id });
          const r = await apiPost({ action: 'addSalary', source, amt, month, year });
          DB.salary = DB.salary.filter(s => String(salId(s)) !== String(id));
          DB.salary.push({ ID: r.id, Source: source, Amount: amt, Month: month, Year: Number(year) });
          renderSalary(); renderDashboard();
        }

        closeModal();
        showToast('Updated successfully ✓');
      } catch (e) {
        showToast('Error: ' + e.message);
      }
    }

    // Close modal on overlay click
    document.getElementById('edit-modal').addEventListener('click', function (e) {
      if (e.target === this) closeModal();
    });

    // ── Init ──────────────────────────────────────────────────────
    const today = new Date();
    const curY = today.getFullYear();
    document.getElementById('exp-date').value = today.toISOString().split('T')[0];
    // Set current year on all year inputs
    ['exp-year', 'sav-year', 'sal-year'].forEach(id => {
      document.getElementById(id).value = curY;
    });
    const curM = MONTHS[today.getMonth()];
    ['exp-month', 'sav-month', 'sal-month'].forEach(id => {
      const el = document.getElementById(id);
      [...el.options].forEach((o, i) => { if (o.value === curM || o.text === curM) el.selectedIndex = i; });
    });
  </script>
</body>

</html>
